    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --accent: #777; --light-gray: #f9f9f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        /* 导航栏 */
        nav { position: fixed; top: 0; width: 100%; padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.98); z-index: 1000; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 400; letter-spacing: 3px; text-decoration: none; color: var(--text); }
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 40px; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; }

        /* 页面标题 */
        header.collection-header { margin-top: 150px; text-align: center; padding: 60px 5% 40px; }
        header.collection-header h1 { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 400; letter-spacing: 1px; }

        /* 核心产品展示区 */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; padding: 0 10% 80px; }
        .product-item { text-align: center; }
        .img-container { position: relative; width: 100%; height: 550px; overflow: hidden; background: #f4f4f4; margin-bottom: 20px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
        .img-container .img-hover { position: absolute; top: 0; left: 0; opacity: 0; }
        .product-item:hover .img-main { opacity: 0; }
        .product-item:hover .img-hover { opacity: 1; }
        .product-info h3 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 5px; }
        .product-info p { font-size: 11px; color: #999; letter-spacing: 2px; text-transform: uppercase; }

        /* 精简版 24 图视觉墙 */
        .visual-wall { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); /* 增加列数使单图变小 */
            gap: 10px; /* 缩小间隙 */
            padding: 80px 5% 100px;
            border-top: 1px solid #eee;
        }
        .wall-item { aspect-ratio: 1 / 1; overflow: hidden; } /* 强制正方形 */
        .wall-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .wall-item img:hover { transform: scale(1.08); }

        /* 页脚 */
        footer { padding: 80px 10% 40px; background: #000; color: white; text-align: center; }
        .footer-email { font-family: 'Playfair Display', serif; font-size: 24px; color: white; text-decoration: none; display: block; margin: 30px 0; font-style: italic; }
        .copyright { font-size: 9px; letter-spacing: 2px; color: #555; text-transform: uppercase; }

        /* 响应式适配 */
        @media (max-width: 1200px) { .visual-wall { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 768px) {
            .products-grid { grid-template-columns: 1fr; }
            .visual-wall { grid-template-columns: repeat(2, 1fr); }
            .img-container { height: 400px; }
            .nav-links { display: none; }
        }
    </style>
</head>
